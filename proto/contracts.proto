package auth;

service auth_service {

    rpc users_login(login_request) returns (is_log_in_succesful);

    rpc users_register(user_mail, user_password) returns (is_sign_up_seccesful);

    rpc send_verification_code(verification_code) returns (is_code_confirmed);


}

