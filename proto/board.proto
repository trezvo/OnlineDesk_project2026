syntax = "proto3";

package online_desk.board;

service BoardService {
    rpc FetchUserBoards(FetchUserBoardsRequest) returns (FetchUserBoardsResponse);
    rpc CreateBoard(CreateBoardRequest) returns (CreateBoardResponse);
    rpc DeleteBoard(DeleteBoardRequest) returns (DeleteBoardResponse);
    rpc CreateBoardSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse);
    rpc SubscribeBoard(stream BoardUpdate) returns (stream BoardUpdate);
}

message FetchUserBoardsRequest {
    string user_id = 1;
    uint64 user_token = 2;
}

message BoardInfo {
    uint64 board_id = 1;
    string board_name = 2;
}

message FetchUserBoardsResponse {
    bool success = 1;
    string message = 2;
    repeated BoardInfo boards = 3;
}

message CreateBoardRequest {
    string user_id = 1;
    uint64 user_token = 2;
    string board_name = 3;
}

message CreateBoardResponse {
    bool success = 1;
    string message = 2;
    uint64 board_id = 3;
}

message DeleteBoardRequest {
    uint64 user_token = 1;
    uint64 board_id = 2;
}

message DeleteBoardResponse {
    bool success = 1;
    string message = 2;
}

message CreateSnapshotRequest {
    uint64 user_token = 1;
    uint64 board_id = 2;
    string user_id = 3;
}

message CreateSnapshotResponse {
    bool success = 1;
}

message WidgetInfo {
    int32 coord_x = 1;
    int32 coord_y = 2;
    string content = 3;
}

enum ActionType {
    EXIT = 0;
    JOIN = 1;
    CREATE = 2;
    UPDATE = 3;
    DELETE = 4;
    FAIL = 6;
}

message BoardUpdate {
    uint64 user_token = 1;
    ActionType action_type = 2;
    uint64 widget_id = 3;
    WidgetInfo update_data = 4;
}
