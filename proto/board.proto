syntax = "proto3";

package online_desk.board;

service BoardService {
    rpc FetchUserBoards(FetchUserBoardsRequest) returns (FetchUserBoardsResponse);
    rpc CreateBoard(CreateBoardRequest) returns (CreateBoardResponse);
    rpc DeleteBoard(DeleteBoardRequest) returns (DeleteBoardResponse);
    rpc SubscribeBoard(stream SubscribeStreamChunck) returns (stream SubscribeStreamChunck);
}

message FetchUserBoardsRequest {
    string user_id = 1;
    uint64 user_token = 2;
}

message BoardInfo {
    uint64 board_id = 1;
    string board_name = 2;
}

message FetchUserBoardsResponse {
    bool success = 1;
    string message = 2;
    repeated BoardInfo boards = 3;
}

message CreateBoardRequest {
    uint64 user_token = 1;
    string board_name = 2;
}

message CreateBoardResponse {
    bool success = 1;
    string message = 2;
    uint64 board_id = 3;
}

message DeleteBoardRequest {
    uint64 user_token = 1;
    uint64 board_id = 2;
}

message DeleteBoardResponse {
    bool success = 1;
    string message = 2;
}

message WidgetInfo {
    int32 coord_x = 1;
    int32 coord_y = 2;
    string content_ = 3;
}


enum WidgetEditType {
    CREATE = 0;
    UPDATE = 1;
    DELETE = 2;
}

message SubscribeStreamChunck {
    WidgetEditType edit_type = 1;
    string widget_id = 2;
    WidgetInfo update_data = 3;
}

