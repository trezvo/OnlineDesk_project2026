syntax = "proto3";

package online_desk.board;

service BoardService {
    rpc GetBoards(GetBoardsRequest) returns (GetBoardsResponse);
    rpc CreateBoard(CreateBoardRequest) returns (CreateBoardResponse);
    rpc DeleteBoard(DeleteBoardRequest) returns (DeleteBoardResponse);
    rpc ViewBoard(ViewBoardRequest) returns (BoardSnap);
    rpc ConnectToBoard(ConnectToBoardRequest) returns (stream BoardEvent);
    rpc UpdateBoard(UpdateBoardRequest) returns (UpdateBoardResponse);
}

message User {
    string user_id = 1;
    string username = 2;
    string user_token = 3;
}

message BoardInfo {
    string board_id = 1;
    string board_name = 2;
    string owner_id = 3;
    uint64 board_version = 4;
    uint64 creation_time_ms = 5;
    uint64 lastupdate_time_ms = 6;
}

message GetBoardsRequest {
    string user_token = 1;
}

message GetBoardsResponse {
    repeated BoardInfo boards = 1;
    string next_board_id = 2;  
}

message CreateBoardRequest {
    string user_token = 1;
    string board_name = 2;
}

message CreateBoardResponse {
    bool success = 1;
    string message = 2;
    BoardInfo board = 3;
}

message DeleteBoardRequest {
    string user_token = 1;
    string board_id = 2;
}

message DeleteBoardResponse {
    bool success = 1;
    string message = 2;
}

message ViewBoardRequest {
    string user_token = 1;
    string board_id = 2;
}

message BoardSnap {
    string board_id = 1;
    string board_version = 2;
}

message ConnectToBoardRequest {
    string user_token = 1;
    string board_id = 2;
}

message Heartbeat {
  uint64 server_time_ms = 1;
}

message BoardEvent {
    string board_id = 1;
    string board_version = 2;
    string user_id = 3;
    oneof payload {
        Heartbeat hearbeat = 10;
    }
}

message UpdateBoardRequest {
    string user_token = 1;
    string board_id = 2;
}

message UpdateBoardResponse {
    bool success = 1;
    string message = 2;
    uint64 new_board_version = 3;
    uint64 time_ms = 4;
}
